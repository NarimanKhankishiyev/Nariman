<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моя облачная анкета</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ffb400;
      color: white;
      font-weight: bold;
    }

    .post {
      width: 100%;
      max-width: 500px;
      background: white;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 15px;
      margin-top: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .like-btn {
      width: auto;
      background: #fff3cd;
      color: black;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
    }

    .time {
      float: right;
      color: #888;
      font-size: 12px;
    }

    #feed {
      width: 100%;
      max-width: 500px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
      <input type="text" id="userName" placeholder="Ваше имя" required />
      <input type="email" id="userEmail" placeholder="Ваш Email" required />
      <button type="submit" id="mainBtn">Отправить в облако</button>
    </form>
  </div>

  <div id="feed"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      updateDoc,
      doc,
      increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_sLEtL1XketmmoMPpsaBbcvQM9hXd-3M",
      authDomain: "nariman-f4034.firebaseapp.com",
      projectId: "nariman-f4034",
      storageBucket: "nariman-f4034.firebasestorage.app",
      messagingSenderId: "281361155101",
      appId: "1:281361155101:web:5dd4ac3ad0461315e632f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.processLike = async (id) => {
      const docRef = doc(db, "requests", id);

      try {
        await updateDoc(docRef, {
          likes: increment(1)
        });
      } catch (e) {
        console.error("Ошибка лайка:", e.message);
      }
    };

    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const btn = document.getElementById("mainBtn");
      btn.disabled = true;

      const nameInput = document.getElementById("userName").value;
      const emailInput = document.getElementById("userEmail").value;

      try {
        await addDoc(collection(db, "requests"), {
          name: nameInput,
          email: emailInput,
          likes: 0,
          timestamp: serverTimestamp()
        });

        document.getElementById("feedbackForm").reset();
        alert("Готово! Данные сохранены в Firebase.");
      } catch (e) {
        alert("Ошибка безопасности: данные отклонены сервером.");
        console.error(e);
      }

      btn.disabled = false;
    });

    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      const feed = document.getElementById("feed");
      feed.innerHTML = "";

      snapshot.forEach((item) => {
        const data = item.data();

        feed.innerHTML += `
          <div class="post">
            <span class="time">
              ${data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "..."}
            </span>
            <b>${data.name}</b>
            <p style="margin: 5px 0;">${data.email}</p>
            <button class="like-btn" onclick="processLike('${item.id}')">
              👍 ${data.likes || 0}
            </button>
          </div>
        `;
      });
    });
  </script>

</body>
</html>
