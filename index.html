<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моя облачная анкета</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 50px;
      background: #f4f4f9;
    }
    .form-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 300px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    button {
      background: #ffb400;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
      <input type="text" id="userName" placeholder="Ваше имя" required />
      <input type="email" id="userEmail" placeholder="Ваш Email" required />
      <button type="submit">Отправить в облако</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_sLEtL1XketmmoMPpsaBbcvQM9hXd-3M",
      authDomain: "nariman-f4034.firebaseapp.com",
      projectId: "nariman-f4034",
      storageBucket: "nariman-f4034.firebasestorage.app",
      messagingSenderId: "281361155101",
      appId: "1:281361155101:web:5dd4ac3ad0461315e632f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nameInput = document.getElementById("userName").value;
      const emailInput = document.getElementById("userEmail").value;

      try {
        await addDoc(collection(db, "requests"), {
          name: nameInput,
          email: emailInput,
          timestamp: new Date()
        });

        alert("Готово! Данные сохранены в Firebase.");
        document.getElementById("feedbackForm").reset();
      } catch (error) {
        console.error("Ошибка записи: ", error);
        alert("Ошибка при отправке.");
      }
    });
  </script>

</body>
</html>
